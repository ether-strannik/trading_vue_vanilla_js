<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>trading-vue-vanilla — candles + RSI sub-pane</title>
  <style>
    :root { --bg: #ffffff; --panel: #f5f6f8; --tx: #2b2b2b; --bd: #e2e4e8; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--tx);
                 font: 13px -apple-system, BlinkMacSystemFont, Arial, sans-serif; }
    .wrap { display: flex; flex-direction: column; height: 100%; }
    header { padding: 10px 14px; border-bottom: 1px solid var(--bd); display: flex;
             align-items: baseline; gap: 12px; }
    header h1 { font-size: 14px; font-weight: 600; margin: 0; }
    header span { color: #6b7280; font-size: 12px; }
    #chart { flex: 1; min-height: 0; }
    footer { padding: 6px 14px; border-top: 1px solid var(--bd); color: #6b7280; font-size: 11px; }
    code { color: #7c4dff; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>trading-vue-vanilla</h1>
      <span>MESU26 &middot; 5m &mdash; candlesticks + a 14-period RSI in its own sub-pane &middot; zero dependencies, no build step</span>
    </header>
    <div id="chart"></div>
    <footer>
      Real CQG MESU26 5-minute history from <code>MESU26-5m.json</code> (cache format
      <code>{ bars: [[time, open, high, low, close, volume], ...] }</code>). Colors come from <code>settings.json</code>.
    </footer>
  </div>

  <script type="module">
    // Import the library from its public entry (one folder up). Over a static
    // file server this needs no bundler and no build step.
    import { createChart, CandlestickSeries, LineSeries } from '../index.js';
    import { generateBars, computeRSI } from './feed.js';

    // 1) Look-and-feel: fetch the settings file (fall back to sane defaults if it
    //    can't be loaded, e.g. opened via file:// without a server).
    const settings = await fetch('./settings.json').then((r) => r.json()).catch(() => ({
      background: '#ffffff', textColor: '#555555', gridColor: '#ececec', borderColor: '#d0d0d0',
      candles: { upColor: '#ffffff', downColor: '#c4c4c4', borderUpColor: '#5e5e5e', borderDownColor: '#5e5e5e', wickUpColor: '#5e5e5e', wickDownColor: '#5e5e5e' },
      rsi: { period: 14, color: '#ff8800', overbought: 70, oversold: 30, guideColor: '#cfcfcf' },
    }));

    // 2) Create the chart, mapping settings -> createChart() options.
    const chart = createChart(document.getElementById('chart'), {
      layout: { background: { color: settings.background }, textColor: settings.textColor },
      grid: { vertLines: { visible: false }, horzLines: { visible: false } },
      crosshair: settings.crosshair,
      timeScale: { borderColor: settings.borderColor, timeVisible: true },
      rightPriceScale: { borderColor: settings.borderColor },
      // allow zooming out far enough to show the whole dataset at once (default cap is 500 bars)
      maxZoom: 2500,
    });

    // 3) The "datafeed": real CQG MESU26 5-minute bars. The history file is the cache
    //    format { bars: [[time, open, high, low, close, volume], ...] } (time = UNIX
    //    seconds) - we map each row to the engine's bar shape. Falls back to a
    //    synthesized series if the file can't be fetched (e.g. opened via file://).
    // Trim the history to last Friday's 16:00 UTC close (2026-06-26 16:00).
    const CUTOFF = Date.UTC(2026, 5, 26, 16, 0, 0) / 1000;
    const bars = await fetch('./MESU26-5m.json')
      .then((r) => r.json())
      .then((d) => (d.bars || [])
        .map(([time, open, high, low, close, volume]) => ({ time, open, high, low, close, volume }))
        .filter((b) => b.time <= CUTOFF))
      .catch(() => generateBars({ count: 1440, step: 300 }));

    // 4) Main pane (paneIndex 0): candlesticks, colored from settings.
    //    Drop volume so no volume bars are drawn (price only).
    const candles = chart.addSeries(CandlestickSeries, settings.candles, 0);
    candles.setData(bars.map(({ volume, ...b }) => b));

    // Show the whole dataset so the time axis spans the full history; fitContent() only
    // frames the recent ~150 bars, so set the full logical range explicitly (+6 margin).
    chart.timeScale().setVisibleLogicalRange({ from: 0, to: bars.length - 1 + 6 });

    // 5) Sub-pane (paneIndex 1): a 14-period RSI line, drawn below the price.
    const rsiCfg = settings.rsi || { period: 14, color: '#c49bff' };
    const rsi = chart.addSeries(LineSeries, { color: rsiCfg.color, lineWidth: 1.5 }, 1);
    rsi.setData(computeRSI(bars, rsiCfg.period));

    // overbought / oversold guide lines on the RSI scale
    if (rsiCfg.overbought) rsi.createPriceLine({ price: rsiCfg.overbought, color: rsiCfg.guideColor, lineStyle: 2 });
    if (rsiCfg.oversold)   rsi.createPriceLine({ price: rsiCfg.oversold,   color: rsiCfg.guideColor, lineStyle: 2 });
  </script>
</body>
</html>
